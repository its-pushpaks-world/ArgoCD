apiVersion: v1
kind: Namespace
metadata:
  name: tomcat
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tomcat
  namespace: tomcat
  labels:
    app: tomcat
spec:
  replicas: 1 
  selector:
    matchLabels:
      app: tomcat
  template:
    metadata:
      labels:
        app: tomcat
    spec:
      containers:
        - name: tomcat
          image: tomcat:10.1-jdk17-temurin
          ports:
            - containerPort: 8080
    
          # ✅ Create ROOT app before starting Tomcat
          command: ["/bin/sh", "-c"]
          args:
            - |
              mkdir -p /usr/local/tomcat/webapps/ROOT && \
              cat <<EOF >/usr/local/tomcat/webapps/ROOT/index.jsp
              <%@ page contentType="text/html;charset=UTF-8" %>
              <html>
              <head><title>Tomcat ROOT</title></head>
              <body>
                <h1>✅ Tomcat ROOT application is running</h1>
              </body>
              </html>
              EOF
              exec catalina.sh run

          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: tomcat
  namespace: tomcat
spec:
  type: LoadBalancer
  selector:
    app: tomcat
  ports:
    - name: http
      port: 80
      targetPort: 8080
